  <rect class="card blue" x="780" y="270" width="585" height="105" rx="16"/>
  <text class="label" x="950" y="300" fill="#1f5fd1">Skill Assets</text>
  <rect class="card blue" x="812" y="318" width="120" height="42" rx="9"/>
  <text class="tiny" x="834" y="345">interface</text>
  <rect class="card blue" x="956" y="318" width="150" height="42" rx="9"/>
  <text class="tiny" x="972" y="345">implementation</text>
  <rect class="card blue" x="1130" y="318" width="130" height="42" rx="9"/>
