  <path class="line blue" d="M710 90 h25" marker-end="url(#arrowBlue)"/>
  <path class="line blue" d="M1228 170 v34" marker-end="url(#arrowBlue)"/>
  <path class="line green" d="M1228 636 v52" marker-end="url(#arrowGreen)"/>

