    <rect class="card green" x="1840" y="305" width="120" height="44" rx="9"/><text x="1856" y="333">S1 Candidate</text>
    <rect class="card green" x="1710" y="370" width="110" height="44" rx="9"/><text x="1732" y="398">Skill B</text>
    <rect class="card green" x="1840" y="370" width="95" height="44" rx="9"/><text x="1859" y="398">S2 Draft</text>
    <rect class="card green" x="1710" y="435" width="110" height="44" rx="9"/><text x="1732" y="463">Skill C</text>
    <rect class="card green" x="1840" y="435" width="110" height="44" rx="9"/><text x="1852" y="463">S3 Verified</text>
