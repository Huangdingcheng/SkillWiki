  <path class="line purple" d="M695 382 h48" marker-end="url(#arrowPurple)"/>
  <path class="line purple" d="M1380 410 h50" marker-end="url(#arrowPurple)"/>
  <path class="line purple" d="M1625 410 h55" marker-end="url(#arrowPurple)"/>
  <path class="line blue" d="M420 448 h0"/>

  <!-- Released skills to task agents -->
