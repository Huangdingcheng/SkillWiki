<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="896" viewBox="0 0 2048 896">
  <rect x="0" y="0" width="2048" height="896" fill="rgb(255,255,255)"/>
  <defs>
    <style>
      text { font-family: "Comic Sans MS", "Trebuchet MS", "Verdana", sans-serif; fill: #111111; }
      .title { font-size: 28px; font-weight: 700; }
      .label { font-size: 21px; font-weight: 700; }
      .small { font-size: 17px; font-weight: 600; }
      .tiny { font-size: 14px; font-weight: 600; }
      .blue { stroke: #1f5fd1; }
      .teal { stroke: #0f8f83; }
      .green { stroke: #169447; }
      .purple { stroke: #7b4cc2; }
      .amber { stroke: #d98a00; }
      .coral { stroke: #df4d3f; }
      .box { fill: #ffffff; stroke-width: 4; }
      .card { fill: #ffffff; stroke-width: 3; }
      .line { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .dash { fill: none; stroke-width: 4; stroke-linecap: round; stroke-dasharray: 12 10; }
    </style>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f5fd1"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f8f83"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#169447"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7b4cc2"/>
    </marker>
  </defs>

  <!-- Knowledge layer -->
  <rect class="box teal" x="40" y="180" width="255" height="536" rx="18"/>
