    <path class="line purple" d="M505 286 v20" marker-end="url(#arrowPurple)"/>
    <path class="line purple" d="M505 359 v20" marker-end="url(#arrowPurple)"/>
    <path class="line purple" d="M505 432 v20" marker-end="url(#arrowPurple)"/>
  </g>

