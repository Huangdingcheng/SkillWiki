    <text x="118" y="352">documents</text>
    <path d="M84 335 h22 v28 h-22 z M106 335 l10 8 v20 h-10 z" fill="#ffffff" stroke="#0f8f83" stroke-width="3"/>
    <rect class="card teal" x="66" y="386" width="205" height="54" rx="12"/>
    <text x="118" y="420">API specs</text>
    <text x="84" y="423" font-size="30" fill="#0f8f83">{}</text>
    <rect class="card teal" x="66" y="454" width="205" height="54" rx="12"/>
    <text x="118" y="488">scripts</text>
    <text x="84" y="491" font-size="29" fill="#0f8f83">&lt;/&gt;</text>
    <rect class="card teal" x="66" y="522" width="205" height="54" rx="12"/>
