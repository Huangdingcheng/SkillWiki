version: '3.9'

services:
  api:
    build:
      context: ./skillwiki
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-claude-sonnet-4-6}
    command: >
      python -m skillwiki.api.main
      --api-key ${LLM_API_KEY}
      --host 0.0.0.0
      --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./skillwiki-frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api

networks:
  default:
    name: skillwiki-network
