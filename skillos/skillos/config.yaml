# SkillOS 配置文件示例
# 注意：API key 必须通过命令行参数 --api-key 提供

# ========== 全局 LLM 配置 ==========
llm:
  api_url: "https://yunwu.ai"
  model: "gpt-5.4-nano"
  # api_key: 通过命令行参数 --api-key 提供
  temperature: 0.7
  max_tokens: 2000
  timeout: 30
  retry_count: 3

# ========== 数据库配置 ==========
database:
  # PostgreSQL
  postgres_host: "localhost"
  postgres_port: 5432
  postgres_database: "skillos"
  postgres_user: "postgres"
  postgres_password: "${DB_POSTGRES_PASSWORD}"

  # Neo4j
  neo4j_uri: "bolt://localhost:7687"
  neo4j_user: "neo4j"
  neo4j_password: "${NEO4J_PASSWORD}"

  # MongoDB
  mongodb_uri: "mongodb://localhost:27017"
  mongodb_database: "skillos"

  # Redis
  redis_host: "localhost"
  redis_port: 6379
  redis_db: 0
  redis_password: null

# ========== 日志配置 ==========
logging:
  level: "INFO"
  format: "json"  # json or text
  file: "logs/skillos.log"
  max_size: "100MB"
  backup_count: 10

# ========== 全局设置 ==========
debug: false
environment: "development"

# ========== Agent 级别的 LLM 配置 ==========
agents:
  # Trajectory Parser - 低温度，确定性输出
  trajectory_parser:
    api_url: "https://yunwu.ai"
    model: "gpt-5.4-nano"
    temperature: 0.5
    max_tokens: 3000
    timeout: 30
    retry_count: 3

  # Skill Generator - 高温度，创意输出
  skill_generator:
    api_url: "https://yunwu.ai"
    model: "gpt-5.4-nano"
    temperature: 0.8
    max_tokens: 4000
    timeout: 30
    retry_count: 3

  # Validator - 很低温度，严格验证
  validator:
    api_url: "https://yunwu.ai"
    model: "gpt-5.4-nano"
    temperature: 0.3
    max_tokens: 2000
    timeout: 30
    retry_count: 3

  # Doc Parser - 中等温度
  doc_parser:
    api_url: "https://yunwu.ai"
    model: "gpt-5.4-nano"
    temperature: 0.6
    max_tokens: 3000
    timeout: 30
    retry_count: 3

  # Script Analyzer - 低温度
  script_analyzer:
    api_url: "https://yunwu.ai"
    model: "gpt-5.4-nano"
    temperature: 0.4
    max_tokens: 2500
    timeout: 30
    retry_count: 3

  # Candidate Miner - 中等温度
  candidate_miner:
    api_url: "https://yunwu.ai"
    model: "gpt-5.4-nano"
    temperature: 0.6
    max_tokens: 3000
    timeout: 30
    retry_count: 3

  # Formalizer - 低温度
  formalizer:
    api_url: "https://yunwu.ai"
    model: "gpt-5.4-nano"
    temperature: 0.4
    max_tokens: 2500
    timeout: 30
    retry_count: 3

  # Draft Generator - 中等温度
  draft_generator:
    api_url: "https://yunwu.ai"
    model: "gpt-5.4-nano"
    temperature: 0.6
    max_tokens: 3500
    timeout: 30
    retry_count: 3

  # Reviewer - 很低温度
  reviewer:
    api_url: "https://yunwu.ai"
    model: "gpt-5.4-nano"
    temperature: 0.2
    max_tokens: 2000
    timeout: 30
    retry_count: 3

  # Executor - 低温度
  executor:
    api_url: "https://yunwu.ai"
    model: "gpt-5.4-nano"
    temperature: 0.3
    max_tokens: 2000
    timeout: 30
    retry_count: 3

  # Planner - 中等温度
  planner:
    api_url: "https://yunwu.ai"
    model: "gpt-5.4-nano"
    temperature: 0.6
    max_tokens: 3000
    timeout: 30
    retry_count: 3

  # Monitor - 低温度
  monitor:
    api_url: "https://yunwu.ai"
    model: "gpt-5.4-nano"
    temperature: 0.3
    max_tokens: 2000
    timeout: 30
    retry_count: 3

  # Evolution Engine - 中等温度
  evolution_engine:
    api_url: "https://yunwu.ai"
    model: "gpt-5.4-nano"
    temperature: 0.6
    max_tokens: 3000
    timeout: 30
    retry_count: 3
